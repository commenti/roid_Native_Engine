name: Build libobserver.so

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      bhook_version:
        description: "ByteHook Maven version (e.g. 2.0.0) or 'latest'"
        required: false
        default: "2.0.0"

env:
  NDK_VERSION:    "26.3.11579264"
  ANDROID_ABI:    "arm64-v8a"
  ANDROID_API:    "34"
  # Use workflow_dispatch input if provided, else default to 2.0.0
  BHOOK_VERSION:  ${{ github.event.inputs.bhook_version || '2.0.0' }}

jobs:
  build:
    name: NDK Build — arm64-v8a
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Resolve paths ───────────────────────────────────────────────────
      - name: Resolve and export paths
        shell: bash
        run: |
          set -euo pipefail
          ENGINE_DIR="${GITHUB_WORKSPACE}"
          BUILD_DIR="${GITHUB_WORKSPACE}/build_output"

          if [[ ! -f "${ENGINE_DIR}/CMakeLists.txt" ]]; then
            echo "::error title=Bad Repo Structure::CMakeLists.txt not found at ${ENGINE_DIR}"
            ls -la "${ENGINE_DIR}"
            exit 1
          fi

          mkdir -p "${BUILD_DIR}"
          echo "ENGINE_DIR=${ENGINE_DIR}" >> "${GITHUB_ENV}"
          echo "BUILD_DIR=${BUILD_DIR}"   >> "${GITHUB_ENV}"

      # ── 3. Java ────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── 4. System dependencies ─────────────────────────────────────────────
      - name: Install build tools
        shell: bash
        run: |
          set -euo pipefail
          ERROR_LOG="$(mktemp)"
          sudo apt-get update -q 2>"${ERROR_LOG}" >/dev/null || {
            echo "::error title=APT Update Failed::$(cat "${ERROR_LOG}")"
            exit 1
          }
          sudo apt-get install -y --no-install-recommends \
              curl unzip ninja-build cmake \
              2>"${ERROR_LOG}" >/dev/null || {
            echo "::error title=APT Install Failed::$(cat "${ERROR_LOG}")"
            exit 1
          }

      # ── 5. Android SDK ─────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 6. NDK — pinned version ────────────────────────────────────────────
      - name: Install pinned NDK ${{ env.NDK_VERSION }}
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install "ndk;${NDK_VERSION}" \
              --sdk_root="${ANDROID_SDK_ROOT}" >/dev/null
          NDK_HOME="${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}"
          if [[ ! -d "${NDK_HOME}" ]]; then
            echo "::error title=NDK Missing::NDK not found at ${NDK_HOME} after install."
            exit 1
          fi
          echo "ANDROID_NDK_HOME=${NDK_HOME}" >> "${GITHUB_ENV}"

      # ── 7. Vendor ByteHook from Maven Central AAR ──────────────────────────
      # The AAR is the only authoritative source of prebuilt libbytehook.so.
      # Git clone of bytedance/bhook contains source only — no prebuilt .so.
      - name: Vendor ByteHook ${{ env.BHOOK_VERSION }} from Maven Central
        shell: bash
        run: |
          set -euo pipefail
          SCRIPT="${ENGINE_DIR}/scripts/vendor_bytehook.sh"

          if [[ ! -f "${SCRIPT}" ]]; then
            echo "::error title=Script Missing::Not found: ${SCRIPT}"
            ls -la "${ENGINE_DIR}/scripts/" 2>/dev/null || true
            exit 1
          fi

          chmod +x "${SCRIPT}"

          FULL_LOG="$(mktemp)"
          bash "${SCRIPT}" "${BHOOK_VERSION}" >"${FULL_LOG}" 2>&1 || {
            echo "::error title=ByteHook Vendor Failed::$(tail -30 "${FULL_LOG}")"
            exit 1
          }

          # Hard assertions — fail with exact missing path
          HEADER="${ENGINE_DIR}/libs/bytehook/include/bytehook.h"
          SOFILE="${ENGINE_DIR}/libs/bytehook/${ANDROID_ABI}/libbytehook.so"

          if [[ ! -f "${HEADER}" ]]; then
            echo "::error title=ByteHook Header Missing::Not found: ${HEADER}"
            find "${ENGINE_DIR}/libs/bytehook" -type f 2>/dev/null | sed 's#^#  #' || true
            exit 1
          fi

          if [[ ! -f "${SOFILE}" ]]; then
            echo "::error title=ByteHook Library Missing::Not found: ${SOFILE}"
            find "${ENGINE_DIR}/libs/bytehook" -type f 2>/dev/null | sed 's#^#  #' || true
            exit 1
          fi

          # Confirm the .so is a valid ELF before handing it to CMake
          file "${SOFILE}" | grep -q "ELF" || {
            echo "::error title=ByteHook Library Corrupt::${SOFILE} is not a valid ELF."
            file "${SOFILE}"
            exit 1
          }

          echo "::notice title=ByteHook Vendored::${SOFILE} ($(du -sh "${SOFILE}" | cut -f1))"

      # ── 8. CMake Configure ─────────────────────────────────────────────────
      - name: CMake Configure
        shell: bash
        run: |
          set -euo pipefail
          ERROR_LOG="$(mktemp)"

          cmake \
            -S "${ENGINE_DIR}" \
            -B "${BUILD_DIR}" \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="${ANDROID_ABI}" \
            -DANDROID_PLATFORM="android-${ANDROID_API}" \
            -DANDROID_STL="c++_static" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_MAKE_PROGRAM="$(command -v ninja)" \
            -DCMAKE_SUPPRESS_REGENERATION=ON \
            --log-level=ERROR \
            2>"${ERROR_LOG}" >/dev/null || {
            FILTERED="$(grep -E '(CMake Error|FATAL_ERROR|error:)' "${ERROR_LOG}" \
                        || cat "${ERROR_LOG}")"
            echo "::error title=CMake Configure Failed::${FILTERED}"
            exit 1
          }

      # ── 9. Build ───────────────────────────────────────────────────────────
      - name: CMake Build
        shell: bash
        run: |
          set -euo pipefail
          FULL_LOG="$(mktemp)"

          cmake --build "${BUILD_DIR}" \
              --config Release \
              --parallel "$(nproc)" \
              >"${FULL_LOG}" 2>&1 || {
            ERRORS="$(grep -E '(error:|FAILED:|ninja:)' "${FULL_LOG}" | head -50)"
            if [[ -z "${ERRORS}" ]]; then
              ERRORS="$(tail -50 "${FULL_LOG}")"
            fi
            echo "::error title=Build Failed::${ERRORS}"
            while IFS= read -r line; do
              [[ -n "${line}" ]] && echo "::error::${line}"
            done <<< "${ERRORS}"
            exit 1
          }

      # ── 10. Verify artifacts ───────────────────────────────────────────────
      - name: Verify build artifacts
        shell: bash
        run: |
          set -euo pipefail
          TOOLCHAIN_BIN="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"

          if [[ ! -f "${BUILD_DIR}/libobserver.so" ]]; then
            echo "::error title=Artifact Missing::libobserver.so not found in ${BUILD_DIR}"
            ls -la "${BUILD_DIR}" || true
            exit 1
          fi

          FILE_OUT="$(file "${BUILD_DIR}/libobserver.so")"
          if ! echo "${FILE_OUT}" | grep -q "aarch64"; then
            echo "::error title=Wrong Architecture::Expected aarch64 ELF. Got: ${FILE_OUT}"
            exit 1
          fi

          "${TOOLCHAIN_BIN}/llvm-readelf" -h "${BUILD_DIR}/libobserver.so" >/dev/null || {
            echo "::error title=ELF Corrupt::llvm-readelf rejected libobserver.so"
            exit 1
          }

          NM_OUT="$("${TOOLCHAIN_BIN}/llvm-nm" \
              --defined-only --extern-only \
              "${BUILD_DIR}/libobserver.so" 2>&1)"
          if ! echo "${NM_OUT}" | grep -q "JNI_OnLoad"; then
            echo "::error title=Symbol Missing::JNI_OnLoad not exported from libobserver.so"
            exit 1
          fi

          echo "::notice title=Build Passed::libobserver.so (arm64-v8a) verified successfully."

      # ── 11. Upload artifacts ───────────────────────────────────────────────
      - name: Upload libobserver.so
        uses: actions/upload-artifact@v4
        with:
          name: libobserver-arm64-v8a-${{ github.sha }}
          path: ${{ env.BUILD_DIR }}/libobserver.so
          retention-days: 14
          if-no-files-found: error
